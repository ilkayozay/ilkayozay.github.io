<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İlkay Özay -  Blog</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
        <link href="./assets/css/main.css" rel="stylesheet">
</head>
<body  data-theme="dark">

<!-- Navigation -->
<header class="absolute top-0 left-0 w-full z-50  " data-theme="dark">
    <nav class="flex justify-between items-center max-w-7xl mx-auto px-6 py-4">
        <a href="/" class="text-2xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-500">

        </a>
        <div class="flex gap-8">
            <a href="about.html" class="hover:text-white transition-colors font-bold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-500">Hakkımda</a>
            <!--
            <a href="/contact" class="hover:text-white transition-colors font-bold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-500">İletişim</a>
            -->
        </div>
    </nav>
</header>

<!-- Theme selector buttons -->
<div class="fixed right-4 top-1/2 -translate-y-1/2 z-50">
    <div class="bg-gray-800 rounded-lg shadow-lg p-1 flex flex-col gap-1">
        <!-- Light theme button -->
        <button class="theme-btn p-2 rounded hover:bg-gray-700 transition-colors" data-theme="light">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="text-yellow-400">
                <circle cx="12" cy="12" r="5"></circle>
                <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" />
            </svg>
        </button>

        <!-- Dark theme button -->
        <button class="theme-btn p-2 rounded hover:bg-gray-700 transition-colors" data-theme="dark">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="text-blue-400">
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
            </svg>
        </button>

        <!-- Sepia theme button -->
        <button class="theme-btn p-2 rounded hover:bg-gray-700 transition-colors" data-theme="sepia">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="text-amber-600">
                <rect x="3" y="3" width="18" height="18" rx="2" ry="2" />
                <path d="M3 9h18M9 21V9" />
            </svg>
        </button>

        <!-- Ocean theme button -->
        <button class="theme-btn p-2 rounded hover:bg-gray-700 transition-colors" data-theme="ocean">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="text-blue-500">
                <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
            </svg>
        </button>


    </div>
</div>




<!-- Hero Section -->
<div class="relative mt-1">
    <div class="mx-auto max-w-7xl px-4 py-8">
        <div class="relative h-32 sm:h-40 md:h-48 lg:h-56 rounded-2xl overflow-hidden">
            <!-- Arkaplan resmi -->
            <div class="absolute inset-0">
                <img src="./assets/images/main-hero.jpg"
                     alt="Hero background"
                     class="w-full h-full object-cover object-center" />
                <div class="absolute inset-0 bg-black/40"></div>
            </div>
            <!-- İçerik -->
            <div class="relative h-full flex items-center justify-center">
                <div class="text-center space-y-2 sm:space-y-4 md:space-y-6 lg:space-y-8 px-4">
                    <h1 class="text-3xl sm:text-4xl md:text-5xl lg:text-6xl font-bold text-white">
                        Kendim İçin Notlar
                    </h1>
                    <p class="text-lg sm:text-xl md:text-2xl text-gray-100">
                        Yazılım, Yapay Zeka ve Teknoloji Üzerine
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>


<!-- Blog Posts Grid -->
<main class="max-w-7xl mx-auto px-4 py-1">
    <div id="articleGrid" class="article-grid grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
        <!-- Articles will be dynamically inserted here -->
    </div>

</main>

<script src="./assets/js/main.js"></script>
</body>
</html>
