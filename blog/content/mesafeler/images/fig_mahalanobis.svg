<ellipse cx="270" cy="195" rx="155" ry="46" fill="#2e6da4" opacity="0.07" transform="rotate(-28 270 195)"/>
<ellipse cx="270" cy="195" rx="112" ry="33" fill="#2e6da4" opacity="0.1" transform="rotate(-28 270 195)"/>
<ellipse cx="270" cy="195" rx="70" ry="21" fill="#2e6da4" opacity="0.13" transform="rotate(-28 270 195)"/>
<circle cx="270" cy="195" r="4" fill="#2e6da4"/>
<text x="278" y="187" font-size="12" fill="#2e6da4">merkez</text>
<circle cx="270" cy="195" r="118" fill="none" stroke="#ccc" stroke-width="1" stroke-dasharray="4 4"/>
<line x1="270" y1="195" x2="374" y2="140" stroke="#4a8a5c" stroke-width="1.5" stroke-dasharray="3 3"/>
