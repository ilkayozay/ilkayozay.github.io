<text x="374" y="164" text-anchor="middle" font-size="11" fill="#4a8a5c">bulutun içinde — normal</text>
<line x1="270" y1="195" x2="325" y2="299" stroke="#c0562e" stroke-width="1.5" stroke-dasharray="3 3"/>
